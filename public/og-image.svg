<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm linen background -->
  <rect width="1200" height="630" fill="#f3ede2"/>

  <!-- Subtle warm gradient overlay for depth -->
  <rect width="1200" height="630" fill="url(#warmGlow)" opacity="0.4"/>

  <!-- Decorative olive leaf cluster — top right -->
  <g transform="translate(920, 60) rotate(15)" opacity="0.12">
    <ellipse cx="60" cy="30" rx="60" ry="30" fill="#3a7a2e"/>
    <ellipse cx="30" cy="80" rx="50" ry="25" transform="rotate(-30 30 80)" fill="#3a7a2e"/>
    <ellipse cx="100" cy="90" rx="45" ry="22" transform="rotate(20 100 90)" fill="#3a7a2e"/>
  </g>

  <!-- Decorative olive leaf cluster — bottom left -->
  <g transform="translate(40, 440) rotate(-10)" opacity="0.08">
    <ellipse cx="50" cy="25" rx="50" ry="25" fill="#3a7a2e"/>
    <ellipse cx="90" cy="70" rx="55" ry="27" transform="rotate(25 90 70)" fill="#3a7a2e"/>
  </g>

  <!-- Icon — speech bubble with leaf -->
  <g transform="translate(100, 180)">
    <rect width="100" height="100" rx="22" fill="#3a7a2e"/>
    <path d="M22 32C22 27.6 25.6 24 30 24H70C74.4 24 78 27.6 78 32V56C78 60.4 74.4 64 70 64H54L44 76V64H30C25.6 64 22 60.4 22 56V32Z" fill="#faf6ee"/>
    <path d="M43 40C43 40 46.5 34 53 34C59.5 34 59.5 40 59.5 45.5C59.5 51 54 55.5 48.5 55.5C43 55.5 43 50 43 45.5" stroke="#3a7a2e" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M48.5 55.5L45 40" stroke="#3a7a2e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Brand name — large serif -->
  <text x="230" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#3d3028" letter-spacing="-1">Hablaba</text>

  <!-- Tagline -->
  <text x="232" y="300" font-family="'DM Sans', -apple-system, system-ui, sans-serif" font-size="24" fill="#3d3028" opacity="0.6">Spanish for daily life</text>

  <!-- Divider line -->
  <rect x="232" y="330" width="60" height="3" rx="1.5" fill="#3a7a2e" opacity="0.4"/>

  <!-- Description -->
  <text x="232" y="380" font-family="'DM Sans', -apple-system, system-ui, sans-serif" font-size="20" fill="#3d3028" opacity="0.5">Practice Spanish with your little one.</text>
  <text x="232" y="410" font-family="'DM Sans', -apple-system, system-ui, sans-serif" font-size="20" fill="#3d3028" opacity="0.5">Warm, calm, encouraging.</text>

  <!-- Honeycomb accent dot -->
  <circle cx="1080" cy="520" r="40" fill="#c49a3a" opacity="0.15"/>
  <circle cx="1120" cy="480" r="20" fill="#c49a3a" opacity="0.1"/>

  <defs>
    <radialGradient id="warmGlow" cx="0.3" cy="0.4" r="0.8">
      <stop offset="0%" stop-color="#c49a3a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f3ede2" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
